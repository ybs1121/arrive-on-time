spring:
  application:
    name: arrive-on-time
  datasource:
    url: jdbc:h2:mem:arriveontime;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
