spring:
  application:
    name: arrive-on-time
  datasource:
    url: jdbc:h2:mem:arriveontime;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

kakao:
  map:
    # 카카오 로컬/길찾기 REST API 호출에 사용하는 키이다.
    rest-api-key: ${KAKAO_REST_API_KEY:}
    # 프론트엔드에서 카카오 지도 SDK를 붙일 때 사용하는 JavaScript 키이다.
    javascript-key: ${KAKAO_JAVASCRIPT_KEY:}
